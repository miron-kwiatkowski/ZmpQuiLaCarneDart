name: quilacarne_waiter
description: QuiLaCarne Waiter Module - Offline-First Mobile Application
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  equatable: ^2.0.5

  # Network & HTTP
  dio: ^5.4.0
  connectivity_plus: ^6.0.0
  path_provider: ^2.1.2

  # Local Database (Isar - fast NoSQL for Flutter)
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # Dependency Injection
  get_it: ^7.6.4
  injectable: ^2.3.2

  # Functional Programming
  dartz: ^0.10.1

  # Utils
  uuid: ^4.2.1
  intl: ^0.18.1
  logger: ^2.0.2+1

  # JSON Serialization
  json_annotation: ^4.8.1

  # Secure Storage (for tokens)
  flutter_secure_storage: ^9.0.0

  # WebSocket & STOMP
  web_socket_channel: ^3.0.3
  stomp_dart_client: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  
  # Code Generation
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  isar_generator: ^3.1.0+1
  injectable_generator: ^2.4.1
  freezed: ^2.4.5
  freezed_annotation: ^2.4.1

flutter:
  uses-material-design: true
